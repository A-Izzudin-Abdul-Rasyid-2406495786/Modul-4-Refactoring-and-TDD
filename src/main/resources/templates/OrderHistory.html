<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order History</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Find Order History</h2>
    <form th:action="@{/order/history}" method="post">
        <div class="form-group">
            <label for="author">Author (Your Name)</label>
            <input type="text" class="form-control col-4" id="author" name="author" placeholder="Enter your name" required>
        </div>
        <button type="submit" class="btn btn-primary">Search</button>
    </form>
</div>
</body>
</html>
