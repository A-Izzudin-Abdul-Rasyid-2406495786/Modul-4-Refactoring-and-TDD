<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><title>Payment Submitted</title><link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="container mt-4">
<h2>Payment Submitted Successfully!</h2>
<p>Your Payment ID is: <strong th:text="${paymentId}"></strong></p>
<a th:href="@{'/payment/detail/' + ${paymentId}}" class="btn btn-info">Check Payment Status</a>
<a th:href="@{/order/history}" class="btn btn-secondary">Back to Orders</a>
</body>
</html>
